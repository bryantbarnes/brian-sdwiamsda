<!DOCTYPE html>
<html>
<head>
    <title>Belajar Membuat Form</title>
    <style>
        body {
            background-image: url(https://i.pinimg.com/736x/cf/97/01/cf97018e99fd8431d9f9c235167cdee5.jpg); /* Warna abu-abu terang ala sosmed */
            font-family: sans-serif;
        }
        .kotak-login {
            background-color: white;
            width: 350px;
            padding: 30px;
            margin: 100px auto; /* Posisi di tengah */
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1); /* Efek bayangan estetik */
            text-align: center;
        }
        /* CSS KHUSUS UNTUK KOTAK INPUT */
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        /* CSS KHUSUS UNTUK TOMBOL */
        button {
            width: 100%;
            padding: 12px;
            background-color: #0866ff; /* Warna biru tombol sosmed */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="kotak-login">
        <h2>Pendaftaran Akun Baru</h2>
        
        <form>
            <input type="text" placeholder="Nama">
            <input type="password" placeholder="pw">
            
            <button type="button">Buat Akun</button>
        </form>

    </div>

</body>
</html>
